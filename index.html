async function api(m,p,b){
  setSy(true);
  try{var r=await fetch(SB+'/rest/v1/'+p,{method:m,headers:{'Content-Type':'application/json','apikey':SK,'Authorization':'Bearer '+SK,'Prefer':m==='POST'?'return=representation':''},body:b?JSON.stringify(b):undefined});var t=await r.text();setSy(false);return t?JSON.parse(t):null;}
  catch(e){setSy(false);setOff();throw e;}
}
function setSy(v){document.getElementById('sd').className='dot '+(v?'sy':'on');document.getElementById('sl').textContent=v?'Synchronisation...':'Donnees en ligne';}
function setOff(){document.getElementById('sd').className='dot';document.getElementById('sl').textContent='Hors ligne';}

/* ===== AUDIT FORM ===== */
function buildForm(){
  ratings={};var cont=document.getElementById('sc');cont.innerHTML='';
  CR.forEach(function(s,si){
    var card=document.createElement('div');card.className='card';card.style.marginBottom='14px';
    card.innerHTML='<div class="sh">'+s.cat+'</div>';
    s.items.forEach(function(item,ii){
      var key=si+'-'+ii;ratings[key]=0;
      var row=document.createElement('div');row.className='cr';
      row.innerHTML='<span class="cl">'+item+'</span><div class="st" id="stars-'+key+'">'+[1,2,3,4,5].map(function(v){return'<div class="s" onclick="rate(\''+key+'\','+v+')">'+v+'</div>';}).join('')+'</div>';
      card.appendChild(row);
    });cont.appendChild(card);
  });updateScore();
}
function rate(key,val){
  ratings[key]=val;
  document.querySelectorAll('#stars-'+key+' .s').forEach(function(s,i){var v=i+1;s.className='s'+(v<=val?(val<=2?' sr':val<=3?' sa':' sg'):'');s.textContent=v;});
  updateScore();
}
function cAvg(si){var v=CR[si].items.map(function(_,ii){return ratings[si+'-'+ii]||0;}).filter(function(v){return v>0;});return v.length?v.reduce(function(a,b){return a+b;},0)/v.length:0;}
function updateScore(){
  var vals=Object.values(ratings).filter(function(v){return v>0;});
  var avg=vals.length?vals.reduce(function(a,b){return a+b;},0)/vals.length:0;
  var cls=avg>=4?'go':avg>=3?'mi':avg>0?'ba':'';
  document.getElementById('ls').innerHTML='<div class="sb"><div class="l">Score</div><div class="v '+cls+'">'+(avg>0?avg.toFixed(1)+'/5':'--')+'</div></div><div class="sb"><div class="l">Notes</div><div class="v">'+Object.values(ratings).filter(function(v){return v>0;}).length+'/'+Object.keys(ratings).length+'</div></div><div class="sb"><div class="l">Avancee</div><div class="v">'+Math.round(Object.values(ratings).filter(function(v){return v>0;}).length/Object.keys(ratings).length*100)+'%</div></div>';
}
async function submitAudit(){
  var name=document.getElementById('shopName').value.trim();if(!name){showToast('Saisis le nom de la boutique');return;}
  var vals=Object.values(ratings).filter(function(v){return v>0;});
  var avg=vals.length?vals.reduce(function(a,b){return a+b;},0)/vals.length:0;
  var ca=CR.map(function(_,si){return cAvg(si);});
  var sorted=ca.map(function(s,i){return{cat:CR[i].cat,score:s};}).filter(function(c){return c.score>0;}).sort(function(a,b){return a.score-b.score;});
  var payload={boutique:name,date_audit:document.getElementById('auditDate').value||new Date().toISOString().split('T')[0],score_global:parseFloat(avg.toFixed(1)),statut:avg>=4?'Bon':avg>=3?'Moyen':'A ameliorer',vitrine:parseFloat(ca[0].toFixed(1))||null,accueil:parseFloat(ca[1].toFixed(1))||null,produits:parseFloat(ca[2].toFixed(1))||null,espace_interieur:parseFloat(ca[3].toFixed(1))||null,digital:parseFloat(ca[4].toFixed(1))||null,point_faible:sorted[0]?sorted[0].cat:null,point_fort:sorted[sorted.length-1]?sorted[sorted.length-1].cat:null,observations:document.getElementById('globalNote').value||null,actions:document.getElementById('actionsNote').value||null,audite_par:document.getElementById('auditedBy').value||null};
  try{await api('POST','audits',payload);showToast('Audit enregistre !');resetAudit();sw('history',document.getElementById('nav-history'));}
  catch(e){showToast('Erreur de connexion');}
}
function resetAudit(){['shopName','auditedBy','globalNote','actionsNote'].forEach(function(id){document.getElementById(id).value='';});document.getElementById('auditDate').value=new Date().toISOString().split('T')[0];buildForm();}

  var cont=document.getElementById('hc');cont.innerHTML='<div class="spinner"></div>';

    var data=await api('GET','audits?order=date_audit.desc,created_at.desc');
    allAudits=data||[];
    if(!allAudits.length){cont.innerHTML='<div class="empty">Aucun audit.<br>Lance ton premier audit !</div>';return;}
    cont.innerHTML='<div style="font-size:13px;color:var(--mu);margin-bottom:10px;font-weight:500">'+allAudits.length+' audit'+(allAudits.length>1?'s':'') +' — clique pour voir le detail</div>'
      +allAudits.map(function(a){
        var sc=parseFloat(a.score_global);
        var bc=sc>=4?'gg':sc>=3?'ga':'gr';
        var lbl=sc>=4?'Bon':sc>=3?'Moyen':'A ameliorer';
        return '<div class="ai" onclick="openAudit('+a.id+')">'
          +'<div class="ah">'
          +'<div style="flex:1;min-width:0"><div class="an">'+a.boutique+'</div>'
          +'<div class="ad">'+(a.date_audit||'')+(a.audite_par?' · par '+a.audite_par:'')+'</div></div>'
          +'<span class="bg2 '+bc+'">'+sc+'/5 — '+lbl+'</span>'
          +'<span style="font-size:20px;color:var(--mu);margin-left:6px;flex-shrink:0">›</span>'
          +'</div></div>';
      }).join('');
  }catch(e){cont.innerHTML='<div class="empty">Erreur de connexion</div>';}
}

/* ===== AUDIT DETAIL — fiche complete ===== */
function openAudit(id){
  var a=allAudits.find(function(x){return x.id===id;});
  if(!a){showToast('Donnees non chargees');return;}
  var sc=parseFloat(a.score_global);
  var bc=sc>=4?'gg':sc>=3?'ga':'gr';
  var lbl=sc>=4?'Bon':sc>=3?'Moyen':'A ameliorer';
  var cls=sc>=4?'go':sc>=3?'mi':'ba';
  document.getElementById('dp-title').textContent=a.boutique;
  document.getElementById('dp-badge').className='bg2 '+bc;
  document.getElementById('dp-badge').textContent=lbl;

  var cats=[
    {n:'Vitrine & entree',v:a.vitrine},
    {n:'Accueil & service',v:a.accueil},
    {n:'Produits',v:a.produits},
    {n:'Espace interieur',v:a.espace_interieur},
    {n:'Digital & reseaux',v:a.digital}
  ];
  var barsHtml=cats.filter(function(c){return c.v&&c.v>0;}).map(function(c){
    var col=c.v>=4?'var(--g)':c.v>=3?'var(--a)':'var(--r)';
    return '<div class="br"><span class="bl2">'+c.n+'</span>'
      +'<div class="bt"><div class="bf" style="width:'+Math.round(c.v/5*100)+'%;background:'+col+'"></div></div>'
      +'<span class="bv">'+parseFloat(c.v).toFixed(1)+'</span></div>';
  }).join('');

  var tagsHtml='';
  if(a.point_faible||a.point_fort){
    tagsHtml='<div class="dp-sec"><div class="dp-st">Points cles</div><div class="tag-row">'
      +(a.point_faible?'<span class="tag tw">⚠ Faible : '+a.point_faible+'</span>':'')
      +(a.point_fort?'<span class="tag ts">✓ Fort : '+a.point_fort+'</span>':'')
      +'</div></div>';
  }

  document.getElementById('dp-body').innerHTML=
    '<div class="big-score">'
    +'<div class="big-num v '+cls+'">'+sc+'<span style="font-size:28px;font-weight:400">/5</span></div>'
    +'<div class="big-sub">Score global</div>'
    +'</div>'
    +'<div class="dp-meta">'
    +(a.date_audit?'<span>📅 '+a.date_audit+'</span>':'')
    +(a.audite_par?'<span>👤 '+a.audite_par+'</span>':'')
    +'</div>'
    +(barsHtml?'<div class="dp-sec"><div class="dp-st">Scores par categorie</div>'+barsHtml+'</div>':'')
    +tagsHtml
    +(a.observations?'<div class="dp-sec"><div class="dp-st">Observations generales</div><div class="dp-text">'+a.observations+'</div></div>':'')
    +(a.actions?'<div class="dp-sec"><div class="dp-st">Actions a mener</div><div class="dp-text">'+a.actions+'</div></div>':'')
    +'<button class="del-btn" onclick="askDel('+a.id+',\''+a.boutique.replace(/\'/g,"\\'")+'\')">'
    +'🗑 Supprimer cet audit</button>';

  document.getElementById('dp').classList.add('open');
}

function askDel(id,name){pendingId=id;document.getElementById('ct').textContent='Supprimer l audit de "'+name+'" ? Irreversible.';document.getElementById('cov').classList.add('open');}
function closeC(){document.getElementById('cov').classList.remove('open');pendingId=null;}
async function doDelete(){
  if(!pendingId)return;var id=pendingId;closeC();closePanel('dp');
  try{await api('DELETE','audits?id=eq.'+id);showToast('Audit supprime');loadHistory();}
  catch(e){showToast('Erreur');}
}

/* ===== STATS AMELIOREES ===== */
async function loadStats(){
  var cont=document.getElementById('stc');cont.innerHTML='<div class="spinner"></div>';
  try{
    var data=await api('GET','audits?order=date_audit.asc,created_at.asc');
    allAudits=data||[];
    if(!allAudits.length){cont.innerHTML='<div class="empty">Aucune donnee</div>';return;}
    buildStatsUI(allAudits);
  }catch(e){cont.innerHTML='<div class="empty">Erreur de connexion</div>';}
}

function buildStatsUI(data){
  var cont=document.getElementById('stc');
  var shops=[...new Set(data.map(function(a){return a.boutique;}))].sort();
  var dates=data.map(function(a){return a.date_audit;}).filter(Boolean).sort();
  var minD=dates[0]||'',maxD=dates[dates.length-1]||'';

  cont.innerHTML=
    '<div class="filter-tabs">'
    +'<button class="ftab active" id="ftab-global" onclick="setStatsMode(\'global\')">Vue globale</button>'
    +'<button class="ftab" id="ftab-boutique" onclick="setStatsMode(\'boutique\')">Par boutique</button>'
    +'<button class="ftab" id="ftab-compare" onclick="setStatsMode(\'compare\')">Comparer</button>'
    +'</div>'
    +'<div class="filter-section">'
    +'<div class="filter-row">'
    +'<select id="f-shop1" onchange="applyStats()"><option value="">Toutes les boutiques</option>'+shops.map(function(s){return'<option>'+s+'</option>';}).join('')+'</select>'
    +'</div>'
    +'<div class="filter-row">'
    +'<input type="date" id="f-from" value="'+minD+'" onchange="applyStats()"/>'
    +'<input type="date" id="f-to" value="'+maxD+'" onchange="applyStats()"/>'
    +'</div>'
    +'<div id="compare-extra" style="display:none"><div class="filter-row">'
    +'<select id="f-shop2" onchange="applyStats()"><option value="">2eme boutique</option>'+shops.map(function(s){return'<option>'+s+'</option>';}).join('')+'</select>'
    +'</div></div>'
    +'</div>'
    +'<div id="stats-output"></div>';

  statsMode='global';
  applyStats();
}

function setStatsMode(mode){
  statsMode=mode;
  document.querySelectorAll('.ftab').forEach(function(t){t.classList.remove('active');});
  document.getElementById('ftab-'+mode).classList.add('active');
  var extra=document.getElementById('compare-extra');
  if(extra)extra.style.display=mode==='compare'?'':'none';
  applyStats();
}

function applyStats(){
  var shop1=document.getElementById('f-shop1')?document.getElementById('f-shop1').value:'';
  var from=document.getElementById('f-from')?document.getElementById('f-from').value:'';
  var to=document.getElementById('f-to')?document.getElementById('f-to').value:'';
  var shop2El=document.getElementById('f-shop2');
  var shop2=shop2El?shop2El.value:'';

  var filtered=allAudits.filter(function(a){
    if(shop1&&a.boutique!==shop1)return false;
    if(from&&a.date_audit&&a.date_audit<from)return false;
    if(to&&a.date_audit&&a.date_audit>to)return false;
    return true;
  });

  var out=document.getElementById('stats-output');
  if(!out)return;

  if(statsMode==='compare'&&shop2){
    var set1=allAudits.filter(function(a){return a.boutique===shop1&&(!from||a.date_audit>=from)&&(!to||a.date_audit<=to);});
    var set2=allAudits.filter(function(a){return a.boutique===shop2&&(!from||a.date_audit>=from)&&(!to||a.date_audit<=to);});
    out.innerHTML=renderCompareTwoBoutiques(shop1||'Boutique 1',set1,shop2,set2);
  } else if(statsMode==='boutique'&&shop1){
    out.innerHTML=renderSingleBoutique(shop1,filtered);
  } else {
    out.innerHTML=renderGlobal(filtered);
  }
}

function avgArr(arr){return arr.length?arr.reduce(function(a,b){return a+b;},0)/arr.length:0;}

function renderGlobal(d){
  if(!d.length)return'<div class="empty">Aucune donnee pour ces filtres</div>';
  var scores=d.map(function(a){return parseFloat(a.score_global);}).filter(function(v){return!isNaN(v);});
  var avg=avgArr(scores);
  var best=d.slice().sort(function(a,b){return parseFloat(b.score_global)-parseFloat(a.score_global);})[0];
  var worst=d.slice().sort(function(a,b){return parseFloat(a.score_global)-parseFloat(b.score_global);})[0];
  var cls=avg>=4?'go':avg>=3?'mi':'ba';
  var keys=['vitrine','accueil','produits','espace_interieur','digital'];
  var names=['Vitrine','Accueil','Produits','Espace int.','Digital'];
  var ca=keys.map(function(k){var vs=d.map(function(a){return parseFloat(a[k]);}).filter(function(v){return!isNaN(v)&&v>0;});return avgArr(vs);});
  var map={};d.forEach(function(a){if(!map[a.boutique])map[a.boutique]={scores:[]};map[a.boutique].scores.push(parseFloat(a.score_global));});
  var rows=Object.keys(map).map(function(n){return{name:n,avg:avgArr(map[n].scores),count:map[n].scores.length};}).sort(function(a,b){return b.avg-a.avg;});
  return '<div class="kg">'
    +'<div class="kpi"><div class="l">Audits</div><div class="v">'+d.length+'</div></div>'
    +'<div class="kpi"><div class="l">Moyenne reseau</div><div class="v '+cls+'">'+avg.toFixed(1)+'/5</div></div>'
    +'<div class="kpi"><div class="l">Meilleure boutique</div><div class="v" style="font-size:13px;margin-top:4px">'+best.boutique+'</div></div>'
    +'<div class="kpi"><div class="l">A surveiller</div><div class="v" style="font-size:13px;margin-top:4px">'+worst.boutique+'</div></div>'
    +'</div>'
    +'<div class="card"><div class="sh">Scores par categorie</div>'
    +names.map(function(n,i){var c=ca[i]>=4?'var(--g)':ca[i]>=3?'var(--a)':'var(--r)';return'<div class="br"><span class="bl2">'+n+'</span><div class="bt"><div class="bf" style="width:'+(ca[i]>0?Math.round(ca[i]/5*100):0)+'%;background:'+c+'"></div></div><span class="bv">'+(ca[i]>0?ca[i].toFixed(1):'--')+'</span></div>';}).join('')
    +'</div>'
    +'<div class="card"><div class="sh">Classement boutiques</div>'
    +'<table class="cmp-table"><thead><tr><th>Boutique</th><th>Audits</th><th>Moy.</th><th>Statut</th></tr></thead><tbody>'
    +rows.map(function(r){var cl=r.avg>=4?'go':r.avg>=3?'mi':'ba';var bc=r.avg>=4?'gg':r.avg>=3?'ga':'gr';return'<tr><td style="font-weight:500">'+r.name+'</td><td style="color:var(--mu)">'+r.count+'</td><td><span class="v '+cl+'" style="font-size:14px">'+r.avg.toFixed(1)+'</span></td><td><span class="bg2 '+bc+'">'+(r.avg>=4?'Bon':r.avg>=3?'Moyen':'A ameliorer')+'</span></td></tr>';}).join('')
    +'</tbody></table></div>';
}

function renderSingleBoutique(name,d){
  if(!d.length)return'<div class="empty">Aucun audit pour cette boutique</div>';
  var scores=d.map(function(a){return parseFloat(a.score_global);}).filter(function(v){return!isNaN(v);});
  var avg=avgArr(scores);
  var cls=avg>=4?'go':avg>=3?'mi':'ba';
  var keys=['vitrine','accueil','produits','espace_interieur','digital'];
  var names=['Vitrine','Accueil','Produits','Espace int.','Digital'];
  var ca=keys.map(function(k){var vs=d.map(function(a){return parseFloat(a[k]);}).filter(function(v){return!isNaN(v)&&v>0;});return avgArr(vs);});
  var evolution=d.map(function(a){var sc=parseFloat(a.score_global);var cl=sc>=4?'go':sc>=3?'mi':'ba';return'<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bg)"><span style="font-size:13px;color:var(--mu);width:90px;flex-shrink:0">'+(a.date_audit||'--')+'</span><div style="flex:1;height:8px;background:var(--bg);border-radius:4px;overflow:hidden"><div style="height:100%;border-radius:4px;background:'+(sc>=4?'var(--g)':sc>=3?'var(--a)':'var(--r)')+';width:'+Math.round(sc/5*100)+'%"></div></div><span class="v '+cl+'" style="font-size:14px;width:36px;text-align:right">'+sc+'</span></div>';}).join('');
  return'<div class="kg">'
    +'<div class="kpi"><div class="l">Audits</div><div class="v">'+d.length+'</div></div>'
    +'<div class="kpi"><div class="l">Moyenne</div><div class="v '+cls+'">'+avg.toFixed(1)+'/5</div></div>'
    +'</div>'
    +'<div class="card"><div class="sh">Scores par categorie</div>'
    +names.map(function(n,i){var c=ca[i]>=4?'var(--g)':ca[i]>=3?'var(--a)':'var(--r)';return'<div class="br"><span class="bl2">'+n+'</span><div class="bt"><div class="bf" style="width:'+(ca[i]>0?Math.round(ca[i]/5*100):0)+'%;background:'+c+'"></div></div><span class="bv">'+(ca[i]>0?ca[i].toFixed(1):'--')+'</span></div>';}).join('')
    +'</div>'
    +'<div class="card"><div class="sh">Evolution dans le temps</div>'+evolution+'</div>';
}

function renderCompareTwoBoutiques(n1,d1,n2,d2){
  if(!d1.length&&!d2.length)return'<div class="empty">Aucune donnee pour ces boutiques</div>';
  var keys=['vitrine','accueil','produits','espace_interieur','digital'];
  var labels=['Vitrine','Accueil','Produits','Espace int.','Digital'];
  function boutiqStats(d){
    var scores=d.map(function(a){return parseFloat(a.score_global);}).filter(function(v){return!isNaN(v);});
    var avg=avgArr(scores);
    var ca=keys.map(function(k){var vs=d.map(function(a){return parseFloat(a[k]);}).filter(function(v){return!isNaN(v)&&v>0;});return avgArr(vs);});
    return{avg:avg,ca:ca,count:d.length};
  }
  var s1=boutiqStats(d1),s2=boutiqStats(d2);
  var c1=s1.avg>=4?'var(--g)':s1.avg>=3?'var(--a)':'var(--r)';
  var c2=s2.avg>=4?'var(--g)':s2.avg>=3?'var(--a)':'var(--r)';

  var html='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">'
    +'<div class="kpi"><div class="l">'+n1+'</div><div class="v" style="color:'+c1+'">'+s1.avg.toFixed(1)+'/5</div><div style="font-size:11px;color:var(--mu)">'+s1.count+' audit(s)</div></div>'
    +'<div class="kpi"><div class="l">'+n2+'</div><div class="v" style="color:'+c2+'">'+s2.avg.toFixed(1)+'/5</div><div style="font-size:11px;color:var(--mu)">'+s2.count+' audit(s)</div></div>'
    +'</div>';

  html+='<div class="card"><div class="sh">Comparaison par categorie</div>';
  labels.forEach(function(lbl,i){
    var v1=s1.ca[i],v2=s2.ca[i];
    var col1=v1>=4?'var(--g)':v1>=3?'var(--a)':'var(--r)';
    var col2=v2>=4?'var(--g)':v2>=3?'var(--a)':'var(--r)';
    var winner=v1>v2?'← '+n1:v2>v1?n2+' →':'Egalite';
    html+='<div style="margin-bottom:14px">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'
      +'<span style="font-size:13px;font-weight:600">'+lbl+'</span>'
      +'<span style="font-size:11px;color:var(--mu)">'+winner+'</span>'
      +'</div>'
      +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">'
      +'<span style="font-size:11px;width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--mu)">'+n1+'</span>'
      +'<div style="flex:1;height:8px;background:var(--bg);border-radius:4px;overflow:hidden"><div style="height:100%;border-radius:4px;background:'+col1+';width:'+Math.round(v1/5*100)+'%"></div></div>'
      +'<span style="font-size:12px;font-weight:600;width:26px;text-align:right;color:var(--mu)">'+(v1>0?v1.toFixed(1):'--')+'</span>'
      +'</div>'
      +'<div style="display:flex;align-items:center;gap:8px">'
      +'<span style="font-size:11px;width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--mu)">'+n2+'</span>'
      +'<div style="flex:1;height:8px;background:var(--bg);border-radius:4px;overflow:hidden"><div style="height:100%;border-radius:4px;background:'+col2+';width:'+Math.round(v2/5*100)+'%"></div></div>'
      +'<span style="font-size:12px;font-weight:600;width:26px;text-align:right;color:var(--mu)">'+(v2>0?v2.toFixed(1):'--')+'</span>'
      +'</div>'
      +'</div>';
  });
  html+='</div>';
  return html;
}

/* ===== MISSIONS ===== */
function loadMissions(){
  var saved=localStorage.getItem('galzin_missions_v2');
  missions=saved?JSON.parse(saved):JSON.parse(JSON.stringify(MISSIONS_DEFAULT));
  renderMissions();
}
function saveMissions(){localStorage.setItem('galzin_missions_v2',JSON.stringify(missions));}
function renderMissions(){
  var order=['urgent','wip','todo','done'];
  var sorted=missions.slice().sort(function(a,b){return order.indexOf(a.statut)-order.indexOf(b.statut);});
  document.getElementById('missions-count').textContent=missions.length+' mission'+(missions.length>1?'s':'');
  document.getElementById('missions-list').innerHTML=sorted.length?sorted.map(function(m){
    return'<div class="mc"><div class="mc-header" onclick="openMission(\''+m.id+'\')"><div class="mc-icon">'+m.icon+'</div><div class="mc-info"><div class="mc-name">'+m.boutique+'</div><div class="mc-type">'+m.type_label+'</div></div><span class="sp '+STATUS_CLS[m.statut]+'">'+STATUS[m.statut]+'</span><span style="font-size:18px;color:var(--mu);margin-left:6px">›</span></div></div>';
  }).join(''):'<div class="empty">Aucune mission.<br>Appuie sur "+ Nouvelle mission" !</div>';
}
function newMission(){
  currentMissionId=null;editingMission=true;
  document.getElementById('mp-title').textContent='Nouvelle mission';
  document.getElementById('mp-edit-toggle').style.display='none';
  document.getElementById('mp-body').innerHTML=buildMissionForm(null);
  document.getElementById('mp').classList.add('open');
}
function openMission(id){
  currentMissionId=id;editingMission=false;
  var m=missions.find(function(x){return x.id===id;});if(!m)return;
  document.getElementById('mp-title').textContent=m.boutique;
  document.getElementById('mp-edit-toggle').textContent='Modifier';
  document.getElementById('mp-edit-toggle').style.display='';
  renderMissionView(m);
  document.getElementById('mp').classList.add('open');
}
function toggleMissionEdit(){
  editingMission=!editingMission;
  var m=missions.find(function(x){return x.id===currentMissionId;});if(!m)return;
  document.getElementById('mp-edit-toggle').textContent=editingMission?'Annuler':'Modifier';
  if(editingMission){document.getElementById('mp-body').innerHTML=buildMissionForm(m);}
  else{renderMissionView(m);}
}
function renderMissionView(m){
  var axesHtml=m.axes.map(function(a,i){return'<div style="display:flex;gap:10px;margin-bottom:8px;font-size:14px"><span style="color:var(--g);font-weight:700;flex-shrink:0">'+(i+1)+'.</span><span>'+a+'</span></div>';}).join('');
  document.getElementById('mp-body').innerHTML=
    '<div style="margin-bottom:16px"><span class="sp '+STATUS_CLS[m.statut]+'" style="font-size:13px;padding:6px 14px">'+STATUS[m.statut]+'</span></div>'
    +(m.problematique?'<div class="dp-sec"><div class="dp-sec-view">Problematique</div><div class="dp-text">'+m.problematique+'</div></div>':'')
    +(m.axes.length?'<div class="dp-sec"><div class="dp-sec-view">Axes de travail</div>'+axesHtml+'</div>':'')
    +(m.concurrence?'<div class="dp-sec"><div class="dp-sec-view">Analyse concurrence</div><div class="dp-text">'+m.concurrence+'</div></div>':'')
    +(m.analyse_offre?'<div class="dp-sec"><div class="dp-sec-view">Analyse de l offre</div><div class="dp-text">'+m.analyse_offre+'</div></div>':'')
    +(m.propositions?'<div class="dp-sec"><div class="dp-sec-view">Propositions & idees</div><div class="dp-text">'+m.propositions+'</div></div>':'')
    +(m.actions_reseaux?'<div class="dp-sec"><div class="dp-sec-view">Actions reseaux sociaux</div><div class="dp-text">'+m.actions_reseaux+'</div></div>':'')
    +(m.notes?'<div class="dp-sec"><div class="dp-sec-view">Notes</div><div class="dp-text">'+m.notes+'</div></div>':'');
}
function buildMissionForm(m){
  var isNew=!m;
  var axesVal=m?m.axes:[''];
  var iconsHtml=ICONS.map(function(ic){return'<div class="icon-opt'+(m&&m.icon===ic?' selected':'')+"\" onclick=\"selectIcon(this,'"+ic+"')\">"+ic+'</div>';}).join('');
  return '<div class="mf-group"><label>Boutique / Nom *</label><input type="text" id="mf-boutique" value="'+(m?m.boutique:'')+'" placeholder="Ex: Galzin Palavas"/></div>'
    +'<div class="mf-group"><label>Type / Categorie</label><input type="text" id="mf-type" value="'+(m?m.type_label:'')+'" placeholder="Ex: Concurrence, Offre restauration..."/></div>'
    +'<div class="mf-group"><label>Icone</label><div class="icon-picker">'+iconsHtml+'</div><input type="hidden" id="mf-icon" value="'+(m?m.icon:'🎯')+'"/></div>'
    +'<div class="mf-group"><label>Statut</label><select id="mf-statut">'+Object.keys(STATUS).map(function(k){return'<option value="'+k+'"'+(m&&m.statut===k?' selected':'')+'>'+STATUS[k]+'</option>';}).join('')+'</select></div>'
    +'<div class="mf-group"><label>Problematique</label><textarea id="mf-problematique" placeholder="Decris l objectif principal...">'+(m?m.problematique:'')+'</textarea></div>'
    +'<div class="mf-group"><label>Axes de travail</label><div class="axes-list" id="axes-list">'+axesVal.map(function(a,i){return axeRow(a,i);}).join('')+'</div><button class="add-axe-btn" onclick="addAxe()">+ Ajouter un axe</button></div>'
    +'<div class="mf-group"><label>Analyse concurrence</label><textarea id="mf-concurrence" placeholder="Observations concurrents...">'+(m?m.concurrence:'')+'</textarea></div>'
    +'<div class="mf-group"><label>Analyse de l offre</label><textarea id="mf-analyse" placeholder="Offre actuelle, points forts...">'+(m?m.analyse_offre:'')+'</textarea></div>'
    +'<div class="mf-group"><label>Propositions & idees</label><textarea id="mf-propositions" placeholder="Actions concretes...">'+(m?m.propositions:'')+'</textarea></div>'
    +'<div class="mf-group"><label>Actions reseaux sociaux</label><textarea id="mf-reseaux" placeholder="Contenu, stories, TikTok...">'+(m?m.actions_reseaux:'')+'</textarea></div>'
    +'<div class="mf-group"><label>Notes diverses</label><textarea id="mf-notes" placeholder="Autres observations...">'+(m?m.notes:'')+'</textarea></div>'
    +'<button class="save-btn" onclick="saveMissionForm(\''+(isNew?'':m.id)+'\')">Enregistrer</button>'
    +(!isNew?'<button class="del-mission-btn" onclick="askDeleteMission(\''+m.id+'\',\''+m.boutique.replace(/\'/g,"\\'")+'\')">🗑 Supprimer cette mission</button>':'');
}
function axeRow(val,i){return'<div class="axe-row" id="axe-'+i+'"><input type="text" value="'+val.replace(/"/g,'&quot;')+'" placeholder="Axe '+(i+1)+'..."/><button class="axe-del" onclick="removeAxe('+i+')">×</button></div>';}
function addAxe(){var list=document.getElementById('axes-list');var i=list.children.length;list.insertAdjacentHTML('beforeend',axeRow('',i));}
function removeAxe(i){var el=document.getElementById('axe-'+i);if(el)el.remove();reindexAxes();}
function reindexAxes(){document.querySelectorAll('#axes-list .axe-row').forEach(function(r,i){r.id='axe-'+i;var d=r.querySelector('.axe-del');if(d)d.setAttribute('onclick','removeAxe('+i+')')});}
function selectIcon(el,icon){document.querySelectorAll('.icon-opt').forEach(function(o){o.classList.remove('selected');});el.classList.add('selected');document.getElementById('mf-icon').value=icon;}
function saveMissionForm(id){
  var boutique=document.getElementById('mf-boutique').value.trim();if(!boutique){showToast('Saisis le nom');return;}
  var axes=[];document.querySelectorAll('#axes-list .axe-row input').forEach(function(inp){if(inp.value.trim())axes.push(inp.value.trim());});
  var data={boutique:boutique,type_label:document.getElementById('mf-type').value||'Mission',icon:document.getElementById('mf-icon').value||'🎯',statut:document.getElementById('mf-statut').value,problematique:document.getElementById('mf-problematique').value,axes:axes,concurrence:document.getElementById('mf-concurrence').value,analyse_offre:document.getElementById('mf-analyse').value,propositions:document.getElementById('mf-propositions').value,actions_reseaux:document.getElementById('mf-reseaux').value,notes:document.getElementById('mf-notes').value};
  if(id){var m=missions.find(function(x){return x.id===id;});if(m)Object.assign(m,data);}
  else{data.id='m'+Date.now();missions.push(data);}
  saveMissions();closePanel('mp');renderMissions();showToast(id?'Mission mise a jour !':'Mission creee !');
}
function askDeleteMission(id,name){pendingMissionId=id;document.getElementById('mct').textContent='Supprimer "'+name+'" ?';document.getElementById('mcov').classList.add('open');}
function closeMC(){document.getElementById('mcov').classList.remove('open');pendingMissionId=null;}
function doDeleteMission(){if(!pendingMissionId)return;missions=missions.filter(function(m){return m.id!==pendingMissionId;});saveMissions();closeMC();closePanel('mp');renderMissions();showToast('Mission supprimee');}

/* ===== UTILS ===== */
function closePanel(id){document.getElementById(id).classList.remove('open');}
function sw(n,btn){document.querySelectorAll('.pg').forEach(function(p){p.classList.remove('active');});document.querySelectorAll('.nb').forEach(function(b){b.classList.remove('active');});document.getElementById('page-'+n).classList.add('active');btn.classList.add('active');if(n==='history')loadHistory();if(n==='stats')loadStats();if(n==='missions')loadMissions();}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}

document.getElementById('auditDate').value=new Date().toISOString().split('T')[0];
buildForm();setSy(false);
</script>
</body>
</html>
